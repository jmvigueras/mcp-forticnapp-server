apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-forticnapp-server
  labels:
    app: mcp-forticnapp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-forticnapp-server
  template:
    metadata:
      labels:
        app: mcp-forticnapp-server
    spec:
      containers:
        - name: mcp-forticnapp-server
          image: jviguerasfortinet/mcp-forticnapp-server:v1.0.0
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-forticnapp-server
spec:
  type: NodePort
  selector:
    app: mcp-forticnapp-server
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30083
